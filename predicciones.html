<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Predicciones - Mundial 2026</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body style="min-height:100vh; padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px));">

  <header class="app-header" style="text-align:left; padding:14px 20px;">
    <div class="max-w-app" style="display:flex; align-items:center; gap:12px;">
      <a href="index.html" style="color:var(--text-muted); text-decoration:none; display:flex; align-items:center;">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <div>
        <h1 style="font-size:1.6rem;">MIS PREDICCIONES</h1>
        <p id="header-nombre" style="color:var(--text-muted); font-size:0.72rem; margin:0;"></p>
      </div>
    </div>
  </header>

  <div class="max-w-app" style="padding:0 16px;">

    <!-- AVISO FECHA LÍMITE -->
    <div id="aviso-deadline" class="hidden" style="margin:12px 0 4px;">
      <div style="background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;">
        <span style="font-size:1.3rem;flex-shrink:0;">🔒</span>
        <div>
          <p style="font-weight:800;color:#ff4444;font-size:0.88rem;margin:0 0 2px;">Plazo cerrado</p>
          <p style="color:var(--text-muted);font-size:0.78rem;margin:0;">El plazo para registrar predicciones terminó el 10 de junio a las 11:59pm. Ya no se pueden modificar.</p>
        </div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs" style="margin-top:10px;">
      <button class="tab active" data-fase="grupos"          onclick="cambiarTab(this,'grupos')">Grupos</button>
      <button class="tab"        data-fase="octavos"         onclick="cambiarTab(this,'octavos')">16avos</button>
      <button class="tab"        data-fase="cuartos"         onclick="cambiarTab(this,'cuartos')">8vos</button>
      <button class="tab"        data-fase="semis"           onclick="cambiarTab(this,'semis')">4tos</button>
      <button class="tab"        data-fase="semis_sf"        onclick="cambiarTab(this,'semis_sf')">Semis</button>
      <button class="tab"        data-fase="final_tab"       onclick="cambiarTab(this,'final_tab')">Final</button>
      <button class="tab"        data-fase="tercer_tab"      onclick="cambiarTab(this,'tercer_tab')">3er Puesto</button>
    </div>

    <div id="partidos-container">
      <div class="loading"><div class="spinner"></div>Cargando...</div>
    </div>

  </div>

  <!-- BOTÓN GUARDAR -->
  <div style="position:fixed; bottom:68px; left:0; right:0; padding:0 16px; z-index:40;">
    <div class="max-w-app">
      <button id="btn-guardar" onclick="guardarTodo()" class="btn-primary" style="box-shadow:0 -8px 32px rgba(0,0,0,0.6);">
        Guardar predicciones
      </button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <nav class="bottom-nav">
    <a href="index.html"         class="nav-item"><span>🏠</span><span>Inicio</span></a>
    <a href="predicciones.html"  class="nav-item active"><span>⚽</span><span>Predicciones</span></a>
    <a href="resultados.html"    class="nav-item"><span>📊</span><span>Partidos</span></a>
    <a href="clasificacion.html" class="nav-item"><span>🏆</span><span>Resultados</span></a>
  </nav>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/scoring.js"></script>
  <script src="js/flags.js"></script>
  <script src="js/db.js"></script>
  <script src="js/bracket.js"></script>
  <script>
    let usuarioActual = null;
    let todosPartidos  = [];
    let todosEquipos   = [];
    let misPredicciones = {}; // { partido_id: { goles_local, goles_visitante } }
    let faseActual = 'grupos';
    let grupoActual = null;
    window.fairplayPicks   = JSON.parse(localStorage.getItem('mundial_fairplay') || '{}');
    window._fairplayInfo   = {}; // { slotKey: { candidates:[a,b], picked:a, pairedSlot:'2X' } }
    window._todosTerceros  = []; // lista ordenada de 3ros para la tabla
    window._viendoTerceros = false;
    window.penaltyPicks    = JSON.parse(localStorage.getItem('mundial_penaltis') || '{}'); // { partido_id: 'local'|'visita' }
    let _slotMapCache = null; // cache para evitar recalcular en cada tab

    // =====================================================
    // INIT
    // =====================================================
    async function init() {
      const userId    = localStorage.getItem('mundial_user_id');
      const userName  = localStorage.getItem('mundial_user_nombre');
      const userGrupo = localStorage.getItem('mundial_user_grupo');
      if (!userId || !userName) { window.location.href = 'index.html'; return; }

      try {
        const part = await db.getParticipante(userName, userGrupo);
        if (!part) { localStorage.clear(); window.location.href = 'index.html'; return; }
        usuarioActual = part;
        window._esBX = (part.grupo === 'BX');
        document.getElementById('header-nombre').textContent = part.nombre;
      } catch(e) { window.location.href = 'index.html'; return; }

      // Verificar fecha límite: 10 de junio de 2026 a las 11:59pm
      const DEADLINE = new Date('2026-06-10T23:59:00');
      const plazoVencido = new Date() >= DEADLINE;
      if (plazoVencido) {
        document.getElementById('aviso-deadline').classList.remove('hidden');
        document.getElementById('btn-guardar').style.display = 'none';
      }

      try {
        const [partidos, predicciones, equipos] = await Promise.all([
          db.getTodosPartidos(),
          db.getPrediccionesPorParticipante(usuarioActual.id),
          db.getEquipos(),
        ]);

        todosPartidos = partidos;
        todosEquipos  = equipos;

        predicciones.forEach(p => { misPredicciones[p.partido_id] = p; });

        // Asegurar que existen los partidos eliminatorios en DB
        await asegurarPartidosEliminatorios();

        renderizarPartidos('grupos');

      } catch(e) {
        console.error(e);
        document.getElementById('partidos-container').innerHTML =
          `<div class="empty-state"><p style="color:var(--red);">Error: ${e.message}</p></div>`;
      }
    }

    // =====================================================
    // ASEGURAR PARTIDOS ELIMINATORIOS EN DB
    // Si no existen, crearlos con "Por definir"
    // =====================================================
    async function asegurarPartidosEliminatorios() {
      const existenOctavos = todosPartidos.some(p => p.fase === 'octavos');
      if (existenOctavos) return;

      const nuevos = [];
      bracket.BRACKET_R32.forEach(m => {
        nuevos.push({ fase:'octavos', grupo:m.label, equipo_local:'Por definir', equipo_visitante:'Por definir', orden:m.orden, numero:m.id, jugado:false });
      });
      bracket.R16_ESTRUCTURA.forEach(m => {
        nuevos.push({ fase:'cuartos', grupo:m.label, equipo_local:'Por definir', equipo_visitante:'Por definir', orden:m.orden, jugado:false });
      });
      bracket.QF_ESTRUCTURA.forEach(m => {
        nuevos.push({ fase:'semis', grupo:m.label, equipo_local:'Por definir', equipo_visitante:'Por definir', orden:m.orden, jugado:false });
      });
      bracket.SF_ESTRUCTURA.forEach(m => {
        nuevos.push({ fase:'tercer_puesto', grupo:m.label, equipo_local:'Por definir', equipo_visitante:'Por definir', orden:m.orden, jugado:false });
      });
      nuevos.push({ fase:'tercer_puesto', grupo:'3er Puesto', equipo_local:'Por definir', equipo_visitante:'Por definir', orden:490, jugado:false });
      nuevos.push({ fase:'final', grupo:'Final', equipo_local:'Por definir', equipo_visitante:'Por definir', orden:500, jugado:false });

      try {
        await db.insertarPartidos(nuevos);
        todosPartidos = await db.getTodosPartidos();
      } catch(e) {
        // Si ya existen (conflict), recargar partidos
        todosPartidos = await db.getTodosPartidos();
      }
    }

    // =====================================================
    // CALCULAR EQUIPOS SIMULADOS (cascada completa)
    // Basado en las predicciones del usuario
    // =====================================================
    function calcularSlotMap() {
      if (_slotMapCache) {
        window._fairplayInfo  = _slotMapCache.fairplayInfo;
        window._todosTerceros = _slotMapCache.todosTerceros;
        return _slotMapCache.slotMap;
      }
      const slotMap = {};
      window._fairplayInfo = {}; // resetear en cada recálculo

      // — Paso 1: simular fase de grupos con predicciones del usuario —
      const gruposEquipos = {};
      todosEquipos.forEach(e => {
        if (!gruposEquipos[e.grupo]) gruposEquipos[e.grupo] = [];
        gruposEquipos[e.grupo].push(e.nombre);
      });

      const clasificaciones = {};
      for (const [grupo, eqs] of Object.entries(gruposEquipos)) {
        const ps = todosPartidos
          .filter(p => p.fase === 'grupos' && p.grupo === grupo)
          .map(p => {
            const pred = misPredicciones[p.id];
            if (pred) return { ...p, jugado:true, goles_local:pred.goles_local, goles_visitante:pred.goles_visitante };
            return p;
          });

        const tieneData = ps.some(p => p.jugado);
        if (tieneData) {
          clasificaciones[grupo] = bracket.calcularClasificacionGrupo(eqs, ps);
        }
      }
      // ── Posición 1°, 2° y 3° por grupo con criterios FIFA ──────────────
      const tercerosPorGrupo = {};

      for (const [grupo, tabla] of Object.entries(clasificaciones)) {
        if (!tabla || !tabla[0]) continue;

        // ¿Hay empate fairplay entre posiciones consecutivas?
        const fp01 = !!tabla[0]?.fairplayTie && !!tabla[1]?.fairplayTie;
        const fp12 = !!tabla[1]?.fairplayTie && !!tabla[2]?.fairplayTie;
        const fp012 = fp01 && fp12; // los 3 primeros empatados en todo

        // — Asignar 1° y 2° —
        if (fp01) {
          const slotA = `1${grupo}`, slotB = `2${grupo}`;
          const candidates = [tabla[0].nombre, tabla[1].nombre];
          const pickA = (window.fairplayPicks[slotA] && candidates.includes(window.fairplayPicks[slotA]))
            ? window.fairplayPicks[slotA] : tabla[0].nombre;
          const pickB = candidates.find(c => c !== pickA);
          slotMap[slotA] = pickA; slotMap[slotB] = pickB;
          window._fairplayInfo[slotA] = { candidates, picked: pickA, pairedSlot: slotB };
          window._fairplayInfo[slotB] = { candidates, picked: pickB, pairedSlot: slotA };
        } else {
          if (tabla[0]) slotMap[`1${grupo}`] = tabla[0].nombre;
          if (tabla[1]) slotMap[`2${grupo}`] = tabla[1].nombre;
        }

        // — Determinar 3° para el pool de mejores terceros —
        if (fp012) {
          // Los 3 primeros están todos empatados: 3° es quien no fue elegido para 1° ni 2°
          const p1 = slotMap[`1${grupo}`], p2 = slotMap[`2${grupo}`];
          const restantes = [tabla[0].nombre, tabla[1].nombre, tabla[2].nombre].filter(n => n !== p1 && n !== p2);
          tercerosPorGrupo[grupo] = restantes[0] || tabla[2].nombre;
        } else if (fp12 && !fp01) {
          // Empate entre 2° y 3°: el 3° es quien no fue elegido como 2°
          const slotA = `2${grupo}`, slotB = `3${grupo}`;
          const candidates = [tabla[1].nombre, tabla[2].nombre];
          const pickA = (window.fairplayPicks[slotA] && candidates.includes(window.fairplayPicks[slotA]))
            ? window.fairplayPicks[slotA] : tabla[1].nombre;
          const pickB = candidates.find(c => c !== pickA);
          // Sobrescribir 2° si se desplazó por fairplay
          slotMap[`2${grupo}`] = pickA;
          window._fairplayInfo[slotA] = { candidates, picked: pickA, pairedSlot: slotB };
          window._fairplayInfo[slotB] = { candidates, picked: pickB, pairedSlot: slotA };
          tercerosPorGrupo[grupo] = pickB;
        } else {
          if (tabla[2]) tercerosPorGrupo[grupo] = tabla[2].nombre;
        }
      }

      // ── Mejores 8 terceros con criterios FIFA y fairplay ─────────────
      const todosTerceros = [];
      for (const [grupo, nombre] of Object.entries(tercerosPorGrupo)) {
        if (!nombre) continue;
        const eq = (clasificaciones[grupo] || []).find(t => t.nombre === nombre);
        if (eq) todosTerceros.push({ ...eq, grupoOrigen: grupo });
      }

      // Criterios: pts → diferencia de goles → goles a favor
      // (No aplica enfrentamientos directos entre terceros porque son de grupos distintos)
      todosTerceros.sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts;
        if (b.dg  !== a.dg)  return b.dg  - a.dg;
        if (b.gf  !== a.gf)  return b.gf  - a.gf;
        return a.nombre.localeCompare(b.nombre);
      });

      // Marcar empates fairplay entre terceros (toda cadena continua de iguales)
      for (let i = 0; i < todosTerceros.length - 1; i++) {
        const a = todosTerceros[i], b = todosTerceros[i+1];
        if (a.pts === b.pts && a.dg === b.dg && a.gf === b.gf) {
          a.fairplayTie3 = true; b.fairplayTie3 = true;
        }
      }

      // Candidatos para slots 3rd-X con fairplay: todos los terceros empatados
      const cands3rd = todosTerceros.filter(t => t.fairplayTie3).map(t => t.nombre);

      todosTerceros.slice(0, 8).forEach((t, i) => {
        const slot = `3rd-${i+1}`;
        if (t.fairplayTie3 && cands3rd.length > 1) {
          const pick = (window.fairplayPicks[slot] && cands3rd.includes(window.fairplayPicks[slot]))
            ? window.fairplayPicks[slot] : t.nombre;
          slotMap[slot] = pick;
          window._fairplayInfo[slot] = { candidates: cands3rd, picked: pick };
        } else {
          slotMap[slot] = t.nombre;
        }
      });

      // — Paso 2: resolver R32 (16avos) —
      bracket.BRACKET_R32.forEach(m => {
        const local  = slotMap[m.home_slot] || m.home_slot;
        const visita = slotMap[m.away_slot]  || m.away_slot;
        slotMap[m.label + '_home'] = local;
        slotMap[m.label + '_away'] = visita;

        const dbMatch = todosPartidos.find(p => p.grupo === m.label);
        if (!dbMatch) return;
        const pred = misPredicciones[dbMatch.id];
        if (pred) {
          const gl = parseInt(pred.goles_local), gv = parseInt(pred.goles_visitante);
          const pp = (window.penaltyPicks || {})[dbMatch.id];
          slotMap[m.label + '_win'] = (gl === gv) ? (pp === 'visita' ? visita : local) : (gv > gl ? visita : local);
        }
      });

      // — Paso 3: resolver R16 (8vos) —
      bracket.R16_ESTRUCTURA.forEach(m => {
        const local  = slotMap[m.from[0] + '_win'] || `[W ${m.from[0]}]`;
        const visita = slotMap[m.from[1] + '_win'] || `[W ${m.from[1]}]`;
        slotMap[m.label + '_home'] = local;
        slotMap[m.label + '_away'] = visita;

        const dbMatch = todosPartidos.find(p => p.grupo === m.label);
        if (!dbMatch) return;
        const pred = misPredicciones[dbMatch.id];
        if (pred) {
          const gl = parseInt(pred.goles_local), gv = parseInt(pred.goles_visitante);
          const pp = (window.penaltyPicks || {})[dbMatch.id];
          slotMap[m.label + '_win'] = (gl === gv) ? (pp === 'visita' ? visita : local) : (gv > gl ? visita : local);
        }
      });

      // — Paso 4: resolver QF (4tos) —
      bracket.QF_ESTRUCTURA.forEach(m => {
        const local  = slotMap[m.from[0] + '_win'] || `[W ${m.from[0]}]`;
        const visita = slotMap[m.from[1] + '_win'] || `[W ${m.from[1]}]`;
        slotMap[m.label + '_home'] = local;
        slotMap[m.label + '_away'] = visita;

        const dbMatch = todosPartidos.find(p => p.grupo === m.label);
        if (!dbMatch) return;
        const pred = misPredicciones[dbMatch.id];
        if (pred) {
          const gl = parseInt(pred.goles_local), gv = parseInt(pred.goles_visitante);
          const pp = (window.penaltyPicks || {})[dbMatch.id];
          const ganador = (gl === gv) ? (pp === 'visita' ? visita : local) : (gv > gl ? visita : local);
          slotMap[m.label + '_win']  = ganador;
          slotMap[m.label + '_loss'] = ganador === local ? visita : local;
        }
      });

      // — Paso 5: resolver SF (Semis) —
      bracket.SF_ESTRUCTURA.forEach(m => {
        const local  = slotMap[m.from[0] + '_win'] || `[W ${m.from[0]}]`;
        const visita = slotMap[m.from[1] + '_win'] || `[W ${m.from[1]}]`;
        slotMap[m.label + '_home'] = local;
        slotMap[m.label + '_away'] = visita;

        const dbMatch = todosPartidos.find(p => p.grupo === m.label && p.fase === 'tercer_puesto');
        if (!dbMatch) return;
        const pred = misPredicciones[dbMatch.id];
        if (pred) {
          const gl = parseInt(pred.goles_local), gv = parseInt(pred.goles_visitante);
          const pp = (window.penaltyPicks || {})[dbMatch.id];
          const ganador = (gl === gv) ? (pp === 'visita' ? visita : local) : (gv > gl ? visita : local);
          slotMap[m.label + '_win']  = ganador;
          slotMap[m.label + '_loss'] = ganador === local ? visita : local;
        }
      });

      // 3er puesto y Final
      slotMap['3er Puesto_home'] = slotMap['SF-1_loss'] || '[Perdedor SF-1]';
      slotMap['3er Puesto_away'] = slotMap['SF-2_loss'] || '[Perdedor SF-2]';
      slotMap['Final_home']      = slotMap['SF-1_win']  || '[Ganador SF-1]';
      slotMap['Final_away']      = slotMap['SF-2_win']  || '[Ganador SF-2]';

      // Exponer lista de terceros para la tabla de mejores 3°
      window._todosTerceros = todosTerceros;

      _slotMapCache = { slotMap, fairplayInfo: window._fairplayInfo, todosTerceros };
      return slotMap;
    }

    // =====================================================
    // CAMBIAR TAB
    // =====================================================
    function cambiarTab(btn, fase) {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      faseActual = fase;
      const c = document.getElementById('partidos-container');
      c.classList.remove('tab-content-enter');
      void c.offsetWidth;
      c.classList.add('tab-content-enter');
      renderizarPartidos(fase);
    }

    // =====================================================
    // RENDER PRINCIPAL
    // =====================================================
    function renderizarPartidos(fase) {
      const container = document.getElementById('partidos-container');

      if (fase === 'grupos') {
        renderGrupos(container);
      } else if (fase === 'semis_sf') {
        renderSemisTab(container);
      } else if (fase === 'tercer_tab') {
        renderTercerPuestoTab(container);
      } else if (fase === 'final_tab') {
        renderFinalTab(container);
      } else {
        renderEliminatoria(container, fase);
      }
    }

    // =====================================================
    // GRUPOS
    // =====================================================
    function renderGrupos(container) {
      const partidos = todosPartidos.filter(p => p.fase === 'grupos');
      const grupos = [...new Set(partidos.map(p => p.grupo))].sort();

      if (grupos.length === 0) {
        container.innerHTML = `<div class="empty-state"><p>No hay partidos. Ve a Configurar.</p></div>`;
        return;
      }

      const grupoInicial = (!window._viendoTerceros && grupoActual && grupos.includes(grupoActual)) ? grupoActual : grupos[0];
      let html = `<div id="subtabs-g" style="display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:6px;">`;
      grupos.forEach(g => {
        const activo = !window._viendoTerceros && g === grupoInicial;
        html += `<button class="tab ${activo?'active':''}" onclick="cambiarSubgrupo(this,'${g}')" style="padding:8px 4px; font-size:0.78rem; text-align:center; width:100%;">Grupo ${g}</button>`;
      });
      html += `</div>`;
      html += `<button id="btn-terceros" onclick="verMejoresTerceros()" class="tab ${window._viendoTerceros?'active':''}" style="width:100%;padding:7px;font-size:0.78rem;margin-bottom:12px;text-align:center;background:rgba(255,214,0,0.06);border-color:rgba(255,214,0,0.25);">📊 Tabla mejores 3°</button>`;
      html += `<div id="contenido-grupo"></div>`;
      container.innerHTML = html;

      if (window._viendoTerceros) {
        renderMejoresTerceros(document.getElementById('contenido-grupo'));
      } else {
        cambiarSubgrupoDirecto(grupoInicial);
      }
    }

    function cambiarSubgrupo(btn, grupo) {
      window._viendoTerceros = false;
      document.querySelectorAll('#subtabs-g .tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const btnT = document.getElementById('btn-terceros');
      if (btnT) btnT.classList.remove('active');
      grupoActual = grupo;
      cambiarSubgrupoDirecto(grupo);
    }

    function verMejoresTerceros() {
      window._viendoTerceros = true;
      document.querySelectorAll('#subtabs-g .tab').forEach(b => b.classList.remove('active'));
      const btnT = document.getElementById('btn-terceros');
      if (btnT) btnT.classList.add('active');
      const c = document.getElementById('contenido-grupo');
      if (c) renderMejoresTerceros(c);
    }

    function renderMejoresTerceros(container) {
      calcularSlotMap(); // usa cache si está disponible
      const terceros = window._todosTerceros || [];

      if (terceros.length === 0) {
        container.innerHTML = `<div style="padding:24px 0; text-align:center; color:var(--text-muted); font-size:0.85rem;">Ingresa predicciones de grupos para ver la tabla.</div>`;
        return;
      }

      const hasFP = terceros.some(t => t.fairplayTie3);
      let html = '';

      html += `<div style="background:var(--surface2);border-radius:12px;overflow:hidden;border:1px solid var(--border);">`;
      // Cabecera
      html += `<div style="display:grid;grid-template-columns:26px 1fr 48px 40px 40px 40px;gap:0;padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.03);">
        <span style="font-size:0.65rem;color:var(--text-muted);font-weight:700;">#</span>
        <span style="font-size:0.65rem;color:var(--text-muted);font-weight:700;">EQUIPO</span>
        <span style="font-size:0.65rem;color:var(--text-muted);font-weight:700;">GRP</span>
        <span style="font-size:0.65rem;color:var(--text-muted);font-weight:700;text-align:center;">PTS</span>
        <span style="font-size:0.65rem;color:var(--text-muted);font-weight:700;text-align:center;">DG</span>
        <span style="font-size:0.65rem;color:var(--text-muted);font-weight:700;text-align:center;">GF</span>
      </div>`;

      const n = Math.min(terceros.length, 12);
      for (let i = 0; i < n; i++) {
        const t = terceros[i];
        const clasifica = i < 8;
        const esFP = t.fairplayTie3;
        const borderBottom = i < n - 1 ? '1px solid var(--border)' : 'none';

        // Separador visual entre clasificados y no clasificados
        const separador = (i === 8)
          ? `<div style="padding:4px 14px;background:rgba(255,68,68,0.08);border-top:1px dashed rgba(255,68,68,0.35);border-bottom:1px dashed rgba(255,68,68,0.35);">
               <span style="font-size:0.62rem;color:rgba(255,68,68,0.7);font-weight:700;letter-spacing:.5px;">NO CLASIFICAN</span>
             </div>` : '';

        html += separador;
        html += `<div style="display:grid;grid-template-columns:26px 1fr 48px 40px 40px 40px;gap:0;padding:9px 14px;border-bottom:${borderBottom};${!clasifica?'opacity:0.38':''}${i===7&&esFP?';background:rgba(255,214,0,0.05)':''}">
          <span style="font-size:0.85rem;font-weight:800;color:${clasifica?'var(--gold)':'var(--text-dim)'};">${i+1}</span>
          <span style="font-size:0.82rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:5px;min-width:0;overflow:hidden;">
            <span style="flex-shrink:0;">${getFlag(t.nombre)}</span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escH(t.nombre)}</span>
            ${esFP ? `<span style="font-size:0.58rem;background:rgba(255,214,0,0.2);color:var(--gold);padding:1px 4px;border-radius:3px;flex-shrink:0;">⚖️</span>` : ''}
          </span>
          <span style="font-size:0.75rem;color:var(--text-muted);display:flex;align-items:center;">${t.grupoOrigen || ''}</span>
          <span style="font-size:0.9rem;font-weight:800;color:${clasifica?'var(--text)':'var(--text-dim)'};text-align:center;">${t.pts}</span>
          <span style="font-size:0.82rem;color:${clasifica?'var(--text)':'var(--text-dim)'};text-align:center;">${t.dg >= 0 ? '+' : ''}${t.dg}</span>
          <span style="font-size:0.82rem;color:${clasifica?'var(--text)':'var(--text-dim)'};text-align:center;">${t.gf}</span>
        </div>`;
      }
      html += `</div>`;
      html += `<p style="color:var(--text-muted);font-size:0.72rem;margin:8px 2px 0;">Clasifican los 8 mejores · pts → dif. goles → goles a favor</p>`;

      if (hasFP) {
        html += `<div style="margin-top:10px;margin-bottom:16px;background:rgba(255,214,0,0.07);border:1px solid rgba(255,214,0,0.25);border-radius:10px;padding:10px 14px;font-size:0.76rem;color:var(--text-muted);">
          <strong style="color:var(--gold);">⚖️ Empate por fair play</strong> — Equipos marcados están empatados en todos los criterios. Ve a <strong>16avos</strong> para elegir cuáles crees que clasifican.
        </div>`;
      } else {
        html += `<div style="height:16px;"></div>`;
      }

      container.innerHTML = html;
    }

    function cambiarSubgrupoDirecto(grupo) {
      grupoActual = grupo;
      const c = document.getElementById('contenido-grupo');
      if (!c) return;
      const partidos = todosPartidos.filter(p => p.fase === 'grupos' && p.grupo === grupo);
      c.innerHTML = partidos.map(p => renderCardPartido(p, p.equipo_local, p.equipo_visitante)).join('');
      // Rellenar predicciones guardadas
      partidos.forEach(p => {
        const pred = misPredicciones[p.id];
        if (pred) {
          const lEl = document.getElementById(`pl-${p.id}`);
          const vEl = document.getElementById(`pv-${p.id}`);
          if (lEl) lEl.value = pred.goles_local;
          if (vEl) vEl.value = pred.goles_visitante;
        }
      });
    }

    // =====================================================
    // FASES ELIMINATORIAS (16avos, 8vos, 4tos)
    // =====================================================
    function renderEliminatoria(container, fase) {
      const slotMap = calcularSlotMap();

      let estructura;
      let titulos;

      if (fase === 'octavos') {
        estructura = bracket.BRACKET_R32.map(m => ({
          label: m.label,
          local: slotMap[m.label + '_home'] || m.home_slot,
          visita: slotMap[m.label + '_away'] || m.away_slot,
          r16: m.r16,
          home_slot: m.home_slot,
          away_slot: m.away_slot
        }));
        titulos = { izq: 'Lado Izquierdo', der: 'Lado Derecho' };
      } else if (fase === 'cuartos') {
        estructura = bracket.R16_ESTRUCTURA.map(m => ({
          label: m.label,
          local: slotMap[m.label + '_home'] || `[W ${m.from[0]}]`,
          visita: slotMap[m.label + '_away'] || `[W ${m.from[1]}]`,
        }));
      } else if (fase === 'semis') {
        estructura = bracket.QF_ESTRUCTURA.map(m => ({
          label: m.label,
          local: slotMap[m.label + '_home'] || `[W ${m.from[0]}]`,
          visita: slotMap[m.label + '_away'] || `[W ${m.from[1]}]`,
        }));
      }

      if (!estructura) { container.innerHTML = `<div class="empty-state"><p>Fase no disponible.</p></div>`; return; }

      let html = `<p class="card-title" style="margin-top:8px;">Basado en tus predicciones de grupos</p>`;

      estructura.forEach(m => {
        const dbMatch = todosPartidos.find(p => p.grupo === m.label);
        if (!dbMatch) {
          html += `<div class="match-card" style="opacity:0.5;">
            <p style="text-align:center; color:var(--text-muted); font-size:0.8rem;">${m.label} — Sin datos</p>
          </div>`;
          return;
        }
        html += `<div style="margin-bottom:2px;"><span style="font-size:0.65rem; color:var(--text-muted); letter-spacing:1px;">${m.label}</span></div>`;
        html += renderCardPartido(dbMatch, m.local, m.visita, m.home_slot, m.away_slot);
      });

      container.innerHTML = html;

      // Rellenar predicciones
      estructura.forEach(m => {
        const dbMatch = todosPartidos.find(p => p.grupo === m.label);
        if (!dbMatch) return;
        const pred = misPredicciones[dbMatch.id];
        if (pred) {
          const lEl = document.getElementById(`pl-${dbMatch.id}`);
          const vEl = document.getElementById(`pv-${dbMatch.id}`);
          if (lEl) lEl.value = pred.goles_local;
          if (vEl) vEl.value = pred.goles_visitante;
        }
      });
    }

    // =====================================================
    // SEMIS + TERCER PUESTO + FINAL
    // =====================================================
    function renderSemisTab(container) {
      const slotMap = calcularSlotMap();
      let html = `<p class="card-title" style="margin-top:8px;">Semifinales</p>`;
      bracket.SF_ESTRUCTURA.forEach(m => {
        const local  = slotMap[m.label + '_home'] || `[W ${m.from[0]}]`;
        const visita = slotMap[m.label + '_away'] || `[W ${m.from[1]}]`;
        const dbMatch = todosPartidos.find(p => p.grupo === m.label && p.fase === 'tercer_puesto');
        if (!dbMatch) return;
        html += `<div style="margin-bottom:2px;"><span style="font-size:0.65rem; color:var(--text-muted); letter-spacing:1px;">${m.label}</span></div>`;
        html += renderCardPartido(dbMatch, local, visita);
      });
      container.innerHTML = html;
      bracket.SF_ESTRUCTURA.map(m => todosPartidos.find(p => p.grupo === m.label && p.fase === 'tercer_puesto'))
        .filter(Boolean).forEach(dbMatch => rellenarPred(dbMatch));
    }

    function renderTercerPuestoTab(container) {
      const slotMap = calcularSlotMap();
      let html = `<p class="card-title" style="margin-top:8px;">3er Puesto</p>`;
      const db3 = todosPartidos.find(p => p.grupo === '3er Puesto');
      if (db3) html += renderCardPartido(db3, slotMap['3er Puesto_home'] || 'Por definir', slotMap['3er Puesto_away'] || 'Por definir');
      container.innerHTML = html;
      if (db3) rellenarPred(db3);
    }

    function renderFinalTab(container) {
      const slotMap = calcularSlotMap();
      let html = `<p class="card-title" style="margin-top:8px;">Gran Final</p>`;
      const dbFinal = todosPartidos.find(p => p.grupo === 'Final');
      if (dbFinal) html += renderCardPartido(dbFinal, slotMap['Final_home'] || 'Por definir', slotMap['Final_away'] || 'Por definir');
      container.innerHTML = html;
      if (dbFinal) rellenarPred(dbFinal);
    }

    function rellenarPred(dbMatch) {
      const pred = misPredicciones[dbMatch.id];
      if (pred) {
        const lEl = document.getElementById(`pl-${dbMatch.id}`);
        const vEl = document.getElementById(`pv-${dbMatch.id}`);
        if (lEl) lEl.value = pred.goles_local;
        if (vEl) vEl.value = pred.goles_visitante;
      }
    }

    // =====================================================
    // CARD DE PARTIDO (genérica)
    // =====================================================
    function renderCardPartido(partido, localNombre, visitaNombre, localSlot, visitaSlot) {
      const pred = misPredicciones[partido.id];
      const jugado = partido.jugado;
      const fL = getFlag(localNombre);
      const fV = getFlag(visitaNombre);
      const esTBD = localNombre === 'Por definir' || localNombre.startsWith('[');

      // Render de nombre de equipo: dropdown si hay empate por fairplay en ese slot
      function renderSlotNombre(nombre, slot, alinear) {
        const info = slot && window._fairplayInfo && window._fairplayInfo[slot];
        if (info) {
          const confirmed = window.fairplayPicks && window.fairplayPicks[slot];
          if (confirmed) {
            // Slot ya confirmado: mostrar bloqueado
            return `<span style="display:inline-flex;align-items:center;gap:5px;justify-content:${alinear==='right'?'flex-end':'flex-start'};">
              <span style="font-size:0.65rem;background:rgba(0,200,83,0.15);color:var(--green);border-radius:4px;padding:1px 5px;">✓</span>
              <span style="font-weight:700;">${getFlag(confirmed)} ${escH(confirmed)}</span>
            </span>`;
          }
          // Filtrar equipos ya confirmados en otros slots del mismo pool
          const alreadyPicked = new Set(
            Object.entries(window.fairplayPicks || {})
              .filter(([k, v]) => k !== slot && info.candidates.includes(v))
              .map(([, v]) => v)
          );
          const disponibles = info.candidates.filter(c => !alreadyPicked.has(c));
          const selectStyle = 'background:rgba(255,214,0,0.08);border:1px solid rgba(255,214,0,0.45);border-radius:7px;color:var(--gold);font-size:0.75rem;font-weight:700;padding:4px 6px;cursor:pointer;max-width:130px;outline:none;';
          const btnStyle = 'background:rgba(0,200,83,0.15);border:1px solid rgba(0,200,83,0.4);color:var(--green);border-radius:6px;padding:3px 9px;font-size:0.72rem;font-weight:700;cursor:pointer;opacity:0.3;pointer-events:none;transition:opacity 0.2s,background 0.2s;';
          return `<span style="display:inline-flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:${alinear==='right'?'flex-end':'flex-start'};">
            <span style="font-size:0.68rem;background:rgba(255,214,0,0.15);color:var(--gold);border-radius:4px;padding:1px 5px;letter-spacing:.5px;">⚖️ Fair play</span>
            <select style="${selectStyle}" onchange="fpPreview('${slot}',this.value)">
              ${disponibles.map(c => `<option value="${escH(c)}"${c===nombre?' selected':''}>${getFlag(c)} ${escH(c)}</option>`).join('')}
            </select>
            <button id="fp-ok-${slot}" style="${btnStyle}" onclick="confirmarFairplay('${slot}')">✓ OK</button>
          </span>`;
        }
        return `${getFlag(nombre)} ${escH(nombre)}`;
      }

      const localHtml  = renderSlotNombre(localNombre,  localSlot,  'right');
      const visitaHtml = renderSlotNombre(visitaNombre, visitaSlot, 'left');

      // Para BX: plazo individual por partido (10 min antes)
      function partidoAbierto(p) {
        if (!window._esBX) return new Date() < new Date('2026-06-10T23:59:00');
        if (!p.fecha || !p.hora) return true;
        const inicio = new Date(p.fecha + 'T' + p.hora);
        return new Date() < new Date(inicio.getTime() - 10 * 60 * 1000);
      }
      const abierto = partidoAbierto(partido);
      // BX puede editar aunque ya tenga pred guardada, si el plazo está abierto
      const puedeEditar = abierto && (!pred || window._esBX);

      const inputsHtml = puedeEditar
        ? `<div style="display:flex; align-items:center; gap:4px; flex-shrink:0;">
             <input type="number" id="pl-${partido.id}" class="score-input" min="0" max="20" placeholder="–" value="${pred && window._esBX ? pred.goles_local : ''}" ${esTBD?'disabled':''} oninput="marcarMod(${partido.id})" onwheel="this.blur()">
             <span class="score-sep">–</span>
             <input type="number" id="pv-${partido.id}" class="score-input" min="0" max="20" placeholder="–" value="${pred && window._esBX ? pred.goles_visitante : ''}" ${esTBD?'disabled':''} oninput="marcarMod(${partido.id})" onwheel="this.blur()">
           </div>`
        : pred
        ? `<div style="display:flex; gap:4px; flex-shrink:0;">
             <div style="width:44px; height:44px; display:flex; align-items:center; justify-content:center; background:var(--surface3); border-radius:8px; font-weight:800; font-size:1.2rem; color:var(--gold-light);">${pred.goles_local}</div>
             <div style="display:flex; align-items:center; padding:0 2px; color:var(--text-dim);">–</div>
             <div style="width:44px; height:44px; display:flex; align-items:center; justify-content:center; background:var(--surface3); border-radius:8px; font-weight:800; font-size:1.2rem; color:var(--gold-light);">${pred.goles_visitante}</div>
           </div>`
        : `<div style="display:flex; align-items:center; gap:4px; flex-shrink:0;">
             <div style="width:44px; height:44px; display:flex; align-items:center; justify-content:center; background:var(--surface3); border-radius:8px; color:var(--text-dim); font-size:1.1rem;">🔒</div>
             <span class="score-sep">–</span>
             <div style="width:44px; height:44px; display:flex; align-items:center; justify-content:center; background:var(--surface3); border-radius:8px; color:var(--text-dim); font-size:1.1rem;">🔒</div>
           </div>`;

      const puntosHtml = jugado && pred ? getPuntosHtml(pred, partido) : '';
      const savedHtml = pred
        ? `<span class="saved-indicator" id="saved-${partido.id}">Guardado</span>`
        : `<span class="saved-indicator hidden" id="saved-${partido.id}">Guardado</span>`;

      const resultadoReal = jugado
        ? `<div style="margin-top:8px; font-size:0.75rem; color:var(--text-muted); text-align:center;">
             Resultado real: <strong style="color:var(--text);">${partido.goles_local} – ${partido.goles_visitante}</strong>
           </div>`
        : '';

      // Selector de penaltis (solo en fases eliminatorias, si la predicción guardada es empate)
      let penaltisHtml = '';
      if (partido.fase !== 'grupos' && !esTBD && !jugado && pred) {
        const glPred = parseInt(pred.goles_local), gvPred = parseInt(pred.goles_visitante);
        if (!isNaN(glPred) && !isNaN(gvPred) && glPred === gvPred) {
          const pp = (window.penaltyPicks || {})[partido.id];
          const btnBase = 'flex:1;padding:6px 4px;border-radius:8px;font-size:0.76rem;font-weight:700;cursor:pointer;transition:all 0.15s;';
          const activeStyle  = 'background:rgba(255,214,0,0.18);border:1px solid var(--gold);color:var(--gold);';
          const inactiveStyle = 'background:var(--surface3);border:1px solid var(--border);color:var(--text-muted);';
          const btnLocalStyle  = pp === 'local'  ? activeStyle : inactiveStyle;
          const btnVisitaStyle = pp === 'visita' ? activeStyle : inactiveStyle;
          const btnOkStyle = `background:rgba(0,200,83,0.15);border:1px solid rgba(0,200,83,0.4);color:var(--green);border-radius:6px;padding:4px 14px;font-size:0.72rem;font-weight:700;cursor:pointer;opacity:0.3;pointer-events:none;transition:opacity 0.2s;flex-shrink:0;`;
          penaltisHtml = `
            <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
              <p style="font-size:0.68rem;color:var(--text-muted);text-align:center;margin:0 0 7px;letter-spacing:.3px;">🥅 Empate ${glPred}–${gvPred} · ¿quién gana los penaltis?</p>
              <div style="display:flex;gap:6px;align-items:center;">
                <button id="pp-local-${partido.id}"  style="${btnBase}${btnLocalStyle}"  onclick="penaltyPreview(${partido.id},'local')">${getFlag(localNombre)} ${escH(localNombre)}</button>
                <button id="pp-visita-${partido.id}" style="${btnBase}${btnVisitaStyle}" onclick="penaltyPreview(${partido.id},'visita')">${getFlag(visitaNombre)} ${escH(visitaNombre)}</button>
                <button id="pp-ok-${partido.id}" style="${btnOkStyle}" onclick="confirmarPenalty(${partido.id})">✓ OK</button>
              </div>
            </div>`;
        }
      }

      return `
        <div class="match-card animate-in ${jugado ? 'jugado' : ''}">
          <div style="display:flex; justify-content:flex-end; margin-bottom:6px; min-height:18px; gap:6px;">
            ${savedHtml}${puntosHtml}
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <div style="flex:1; text-align:right; font-weight:600; font-size:0.85rem; line-height:1.3; color:${esTBD?'var(--text-muted)':'var(--text)'};">${localHtml}</div>
            ${inputsHtml}
            <div style="flex:1; font-weight:600; font-size:0.85rem; line-height:1.3; color:${esTBD?'var(--text-muted)':'var(--text)'};">${visitaHtml}</div>
          </div>
          ${resultadoReal}
          ${penaltisHtml}
        </div>`;
    }

    function getPuntosHtml(pred, partido) {
      const pts  = scoring.calcularPuntos(pred, partido);
      const tipo = scoring.getTipoAcierto(pred, partido);
      const cls  = tipo === 'exacto' ? 'pts-exacto' : tipo === 'parcial' ? 'pts-parcial' : tipo === 'correcto' ? 'pts-correcto' : tipo === 'marcador' ? 'pts-marcador' : 'pts-fallo';
      const txt  = tipo === 'exacto' ? 'Exacto' : tipo === 'parcial' ? 'Resultado+' : tipo === 'correcto' ? 'Resultado' : tipo === 'marcador' ? 'Marcador' : 'Fallo';
      return `<span class="pts-badge ${cls}">${txt} · ${pts>0?'+'+pts:'0'} pts</span>`;
    }

    function marcarMod(partidoId) {
      const el = document.getElementById(`saved-${partidoId}`);
      if (el) el.classList.add('hidden');
    }

    // =====================================================
    // GUARDAR CAMPEÓN
    // =====================================================
    // =====================================================
    // GUARDAR TODO
    // =====================================================
    async function guardarTodo() {
      if (!usuarioActual) return;
      if (!window._esBX && new Date() >= new Date('2026-06-10T23:59:00')) {
        mostrarToast('🔒 El plazo para subir predicciones terminó el 10 de junio');
        return;
      }
      const btn = document.getElementById('btn-guardar');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      const fases = ['grupos','octavos','cuartos','semis','tercer_puesto','final'];
      const promesas = [];
      let contador = 0;

      for (const fase of fases) {
        const partidos = todosPartidos.filter(p => {
          if (p.fase !== fase || p.jugado) return false;
          if (window._esBX) {
            // BX: guardar si hay input (aunque ya tenga pred) y si el plazo está abierto
            if (!p.fecha || !p.hora) return false;
            const inicio = new Date(p.fecha + 'T' + p.hora);
            return new Date() < new Date(inicio.getTime() - 10 * 60 * 1000);
          }
          return !misPredicciones[p.id];
        });
        for (const partido of partidos) {
          const lEl = document.getElementById(`pl-${partido.id}`);
          const vEl = document.getElementById(`pv-${partido.id}`);
          if (!lEl || !vEl || lEl.value === '' || vEl.value === '') continue;
          const gl = parseInt(lEl.value), gv = parseInt(vEl.value);
          if (isNaN(gl) || isNaN(gv)) continue;
          contador++;
          promesas.push(
            db.guardarPrediccion(usuarioActual.id, partido.id, gl, gv).then(() => {
              misPredicciones[partido.id] = { goles_local: gl, goles_visitante: gv };
              const el = document.getElementById(`saved-${partido.id}`);
              if (el) el.classList.remove('hidden');
            })
          );
        }
      }

      if (promesas.length === 0) {
        mostrarToast('Sin predicciones nuevas');
        btn.disabled = false; btn.textContent = 'Guardar predicciones'; return;
      }

      try {
        await Promise.all(promesas);
        mostrarToast(`${contador} predicciones guardadas`);
        _slotMapCache = null; // invalidar cache al guardar
        renderizarPartidos(faseActual);
      } catch(e) { mostrarToast('Error al guardar'); }

      btn.disabled = false;
      btn.textContent = 'Guardar predicciones';
    }

    // =====================================================
    // FAIRPLAY PICKS
    // =====================================================
    function setPenaltyPick(partidoId, winner) {
      if (!window.penaltyPicks) window.penaltyPicks = {};
      window.penaltyPicks[partidoId] = winner;
      localStorage.setItem('mundial_penaltis', JSON.stringify(window.penaltyPicks));
      _slotMapCache = null;
      renderizarPartidos(faseActual);
    }

    function fpPreview(slotKey, value) {
      if (!window._fpPending) window._fpPending = {};
      window._fpPending[slotKey] = value;
      const btn = document.getElementById('fp-ok-' + slotKey);
      if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }
    }

    function confirmarFairplay(slotKey) {
      const val = (window._fpPending || {})[slotKey];
      if (val) setFairplayPick(slotKey, val);
    }

    function penaltyPreview(partidoId, winner) {
      if (!window._penaltyPending) window._penaltyPending = {};
      window._penaltyPending[partidoId] = winner;
      const btnLocal  = document.getElementById(`pp-local-${partidoId}`);
      const btnVisita = document.getElementById(`pp-visita-${partidoId}`);
      const btnOk     = document.getElementById(`pp-ok-${partidoId}`);
      const activeStyle   = 'rgba(255,214,0,0.18)';
      const inactiveStyle = 'var(--surface3)';
      if (btnLocal)  { btnLocal.style.background  = winner === 'local'  ? activeStyle : inactiveStyle; btnLocal.style.borderColor  = winner === 'local'  ? 'var(--gold)' : 'var(--border)'; btnLocal.style.color  = winner === 'local'  ? 'var(--gold)' : 'var(--text-muted)'; }
      if (btnVisita) { btnVisita.style.background = winner === 'visita' ? activeStyle : inactiveStyle; btnVisita.style.borderColor = winner === 'visita' ? 'var(--gold)' : 'var(--border)'; btnVisita.style.color = winner === 'visita' ? 'var(--gold)' : 'var(--text-muted)'; }
      if (btnOk) { btnOk.style.opacity = '1'; btnOk.style.pointerEvents = 'auto'; }
    }

    function confirmarPenalty(partidoId) {
      const val = (window._penaltyPending || {})[partidoId];
      if (!val) return;
      delete window._penaltyPending[partidoId];
      setPenaltyPick(partidoId, val);
    }

    function setFairplayPick(slotKey, value) {
      if (!window.fairplayPicks) window.fairplayPicks = {};
      window.fairplayPicks[slotKey] = value;
      // Sincronizar el slot emparejado con el otro equipo
      const info = window._fairplayInfo[slotKey];
      if (info && info.pairedSlot) {
        const otro = info.candidates.find(c => c !== value);
        window.fairplayPicks[info.pairedSlot] = otro;
      }
      localStorage.setItem('mundial_fairplay', JSON.stringify(window.fairplayPicks));
      _slotMapCache = null;
      renderizarPartidos(faseActual);
    }

    // =====================================================
    // HELPERS
    // =====================================================
    function getFlag(n) { return (window.flags && window.flags[n]) ? window.flags[n] : '🏳️'; }
    function escH(str) { if (!str) return 'Por definir'; const d = document.createElement('div'); d.appendChild(document.createTextNode(str)); return d.innerHTML; }
    function mostrarToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
