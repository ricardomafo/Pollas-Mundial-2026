<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Clasificación - Mundial 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body style="min-height:100vh; padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));">

  <!-- HEADER -->
  <header class="app-header" style="text-align: left; padding: 14px 16px;">
    <div class="max-w-app">
      <h1 style="font-size: 1.4rem; margin: 0; background: linear-gradient(135deg, var(--gold), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🏆 CLASIFICACIÓN</h1>
      <p style="color: var(--text-muted); font-size: 0.75rem; margin: 4px 0 0;">Puntuación en tiempo real</p>
    </div>
  </header>

  <div class="max-w-app" style="padding: 16px;">

    <!-- Estado de carga -->
    <div id="loading" style="text-align:center; padding: 60px 20px;">
      <div class="spinner" style="margin: 0 auto 12px;"></div>
      <p style="color: var(--text-muted); font-size: 0.9rem;">Calculando puntos...</p>
    </div>

    <!-- Contenido principal -->
    <div id="contenido" class="hidden">

      <!-- PODIO TOP 3 -->
      <div id="podio-section" style="margin-bottom: 20px;"></div>

      <!-- TABLA COMPLETA -->
      <div class="card" style="padding: 0; overflow: hidden; margin-bottom: 16px;">
        <div style="padding: 14px 16px; border-bottom: 1px solid var(--border);">
          <p style="font-weight: 700; font-size: 1rem; margin: 0;">Tabla completa</p>
        </div>
        <div style="overflow-x: auto;">
          <table class="lb-table">
            <thead>
              <tr>
                <th>Pos</th>
                <th>Nombre</th>
                <th style="text-align:center;">Pts</th>
                <th style="text-align:center;" title="Exactos">🎯</th>
                <th style="text-align:center;" title="Correctos">✓</th>
                <th>Campeón</th>
              </tr>
            </thead>
            <tbody id="tabla-cuerpo"></tbody>
          </table>
        </div>
      </div>

      <!-- GRÁFICO EVOLUCIÓN -->
      <div class="card" style="margin-bottom: 16px;">
        <p style="font-weight: 700; font-size: 1rem; margin: 0 0 4px;">Evolución del marcador</p>
        <p style="color: var(--text-muted); font-size: 0.75rem; margin: 0 0 16px;">Puntos acumulados por fecha</p>
        <div id="chart-container" style="position: relative; height: 280px;">
          <canvas id="evolucionChart"></canvas>
        </div>
        <div id="no-partidos" class="hidden" style="text-align:center; padding: 32px 0;">
          <div style="font-size:2.5rem; margin-bottom:10px;">📅</div>
          <p style="color:var(--text-muted); font-weight:600;">Aún no se han jugado partidos</p>
          <p style="color:var(--text-muted); font-size:0.8rem; margin-top:4px;">La gráfica aparecerá aquí</p>
        </div>
      </div>

    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span>🏠</span>
      <span>Inicio</span>
    </a>
    <a href="predicciones.html" class="nav-item">
      <span>⚽</span>
      <span>Predicciones</span>
    </a>
    <a href="resultados.html" class="nav-item">
      <span>📊</span>
      <span>Partidos</span>
    </a>
    <a href="clasificacion.html" class="nav-item active">
      <span>🏆</span>
      <span>Resultados</span>
    </a>
  </nav>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/scoring.js"></script>
  <script src="js/flags.js"></script>
  <script src="js/db.js"></script>
  <script>
    const COLORES = [
      '#ffd600', '#00c853', '#60a5fa', '#f87171', '#a78bfa',
      '#fb923c', '#38bdf8', '#4ade80', '#f472b6', '#facc15',
      '#c084fc', '#2dd4bf',
    ];

    async function init() {
      try {
        const [clasificacion, evolucion] = await Promise.all([
          db.calcularClasificacion(),
          db.calcularEvolucion()
        ]);

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('contenido').classList.remove('hidden');

        renderizarPodio(clasificacion);
        renderizarTabla(clasificacion);
        renderizarGrafico(evolucion);

      } catch (e) {
        console.error(e);
        document.getElementById('loading').innerHTML = `
          <div style="text-align:center;">
            <p style="color:var(--red); font-weight:600;">Error al cargar datos</p>
            <p style="color:var(--text-muted); font-size:0.85rem; margin-top:6px;">${e.message || 'Comprueba tu conexión'}</p>
            <button onclick="init()" class="btn-primary" style="width:auto; margin-top:16px; padding:10px 20px;">Reintentar</button>
          </div>
        `;
      }
    }

    function renderizarPodio(clasificacion) {
      const container = document.getElementById('podio-section');

      if (clasificacion.length === 0) {
        container.innerHTML = `
          <div class="card" style="text-align:center; padding: 32px 20px;">
            <div style="font-size:3rem; margin-bottom:12px;">👥</div>
            <p style="font-weight:700; color:var(--text);">Sin participantes todavía</p>
          </div>
        `;
        return;
      }

      const primero = clasificacion[0];
      const segundo = clasificacion[1];
      const tercero = clasificacion[2];

      function tarjetaPodio(part, claseNum, minHeight, medalla) {
        if (!part) return '<div style="flex:1;"></div>';
        const clases = { 1: 'podium-1', 2: 'podium-2', 3: 'podium-3' };
        return `
          <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end;">
            <div class="avatar" style="margin-bottom:8px;">${part.nombre.charAt(0).toUpperCase()}</div>
            <div class="podium-item ${clases[claseNum]}" style="width:100%; min-height:${minHeight}px;">
              <div class="podium-medal">${medalla}</div>
              <div class="podium-name">${escapeHtml(part.nombre)}</div>
              <div class="podium-pts">${part.puntos}</div>
              <div style="font-size:0.7rem; color:var(--text-muted);">pts</div>
            </div>
          </div>
        `;
      }

      container.innerHTML = `
        <div>
          <p class="section-title" style="text-align:center;">🏅 Podio</p>
          <div style="display:flex; align-items:flex-end; gap:8px;">
            ${tarjetaPodio(segundo, 2, 110, '🥈')}
            ${tarjetaPodio(primero, 1, 140, '🥇')}
            ${tarjetaPodio(tercero, 3, 90, '🥉')}
          </div>
        </div>
      `;
    }

    function renderizarTabla(clasificacion) {
      const tbody = document.getElementById('tabla-cuerpo');

      if (clasificacion.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align:center; padding: 32px; color:var(--text-muted);">No hay participantes</td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = clasificacion.map(p => {
        let rowClass = '';
        if (p.posicion === 1) rowClass = 'top-1';
        else if (p.posicion === 2) rowClass = 'top-2';
        else if (p.posicion === 3) rowClass = 'top-3';

        const posBadgeClass = p.posicion === 1 ? 'pos-1' : p.posicion === 2 ? 'pos-2' : p.posicion === 3 ? 'pos-3' : 'pos-other';

        return `
          <tr class="${rowClass}">
            <td><span class="pos-badge ${posBadgeClass}">${p.posicion}</span></td>
            <td>
              <div style="display:flex; align-items:center; gap:8px;">
                <div class="avatar" style="width:28px; height:28px; font-size:0.75rem;">${p.nombre.charAt(0).toUpperCase()}</div>
                <span style="font-weight:600; font-size:0.9rem;">${escapeHtml(p.nombre)}</span>
              </div>
            </td>
            <td style="text-align:center;">
              <span style="font-weight:900; font-size:1.1rem; ${p.posicion === 1 ? 'color:var(--gold);' : ''}">${p.puntos}</span>
            </td>
            <td style="text-align:center; font-weight:600;">${p.exactos}</td>
            <td style="text-align:center; font-weight:600;">${p.correctos}</td>
            <td style="font-size:0.8rem; color:var(--text-muted);">
              ${p.campeon_predicho
                ? `<span style="${p.puntos_campeon > 0 ? 'color:var(--gold); font-weight:700;' : ''}">${window.getFlag(p.campeon_predicho)} ${escapeHtml(p.campeon_predicho)}${p.puntos_campeon > 0 ? ' 🏆' : ''}</span>`
                : '<span style="color:var(--border);">—</span>'
              }
            </td>
          </tr>
        `;
      }).join('');
    }

    function renderizarGrafico(evolucion) {
      const canvas = document.getElementById('evolucionChart');
      const noPartidos = document.getElementById('no-partidos');
      const container = document.getElementById('chart-container');

      if (!evolucion.fechas || evolucion.fechas.length === 0) {
        canvas.style.display = 'none';
        noPartidos.classList.remove('hidden');
        container.style.height = 'auto';
        return;
      }

      const datasets = evolucion.series.map((serie, i) => ({
        label: serie.nombre,
        data: serie.data,
        borderColor: COLORES[i % COLORES.length],
        backgroundColor: COLORES[i % COLORES.length] + '18',
        pointBackgroundColor: COLORES[i % COLORES.length],
        pointRadius: 4,
        pointHoverRadius: 7,
        borderWidth: 2.5,
        tension: 0.3,
        fill: false,
      }));

      const fechasFormateadas = evolucion.fechas.map(f => {
        const d = new Date(f + 'T12:00:00');
        return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
      });

      new Chart(canvas, {
        type: 'line',
        data: { labels: fechasFormateadas, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                color: '#7a9ab5',
                font: { size: 11, weight: '600', family: 'Inter' },
                boxWidth: 12,
                padding: 12,
                usePointStyle: true,
                pointStyle: 'circle'
              }
            },
            tooltip: {
              backgroundColor: '#162436',
              titleColor: '#f0f4f8',
              bodyColor: '#7a9ab5',
              borderColor: '#1e3a52',
              borderWidth: 1,
              padding: 10,
              callbacks: {
                label: ctx => ` ${ctx.dataset.label}: ${ctx.raw} pts`
              }
            }
          },
          scales: {
            x: {
              grid: { color: '#1e3a52' },
              ticks: { color: '#7a9ab5', font: { size: 11, family: 'Inter' } }
            },
            y: {
              beginAtZero: true,
              grid: { color: '#1e3a52' },
              ticks: {
                color: '#7a9ab5',
                font: { size: 11, family: 'Inter' },
                stepSize: 1
              }
            }
          }
        }
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
